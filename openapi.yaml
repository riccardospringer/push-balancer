openapi: 3.0.3

info:
  title: Push Balancer API
  version: 3.1.0
  description: |
    Push Balancer is an editorial decision-support API for push notification planning.
    It exposes article candidates, live push history, research insights, and advisory
    machine-learning model outputs for editorial workflows.
  contact:
    name: Axel Springer National Media & Tech GmbH & Co. KG
    url: https://github.com/riccardospringer/next-push.balancer
    email: push-balancer@axelspringer.com

servers:
  - url: http://localhost:8050
    description: Local development

security:
  - bearerAuth: []

tags:
  - name: System
    description: Health and runtime diagnostics
  - name: Articles
    description: Article candidate discovery from the BILD sitemap
  - name: Pushes
    description: Live push history and refresh actions
  - name: Competition
    description: Competitor monitoring feeds
  - name: Research
    description: Research insights and derived editorial rules
  - name: Analytics
    description: Adobe traffic analytics and editorial support data
  - name: ML
    description: Advisory machine-learning model contracts
  - name: GBRT
    description: Gradient boosted regression tree model contracts
  - name: Planning
    description: Daily plan and retrospective planning data
  - name: AI
    description: Title generation and other AI-assisted capabilities

paths:
  /api/health:
    get:
      tags: [System]
      operationId: getHealth
      summary: Get the current health status
      description: Returns service health, endpoint checks, uptime, and research activity metadata.
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/articles:
    get:
      tags: [Articles]
      operationId: listArticles
      summary: List article candidates
      description: Returns typed article candidates from the BILD sitemap enriched with heuristic scoring.
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/LimitArticles"
      responses:
        "200":
          description: Article candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleCollectionResponse"
        "502":
          $ref: "#/components/responses/BadGateway"
        "422":
          $ref: "#/components/responses/UnprocessableContent"

  /api/pushes:
    get:
      tags: [Pushes]
      operationId: listPushes
      summary: List recent push notifications
      description: Returns recent push history together with same-day aggregate statistics.
      parameters:
        - name: limit
          in: query
          description: Maximum number of push entries to return.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 300
            default: 100
      responses:
        "200":
          description: Recent push history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushCollectionResponse"
        "422":
          $ref: "#/components/responses/UnprocessableContent"

  /api/pushes/refresh:
    post:
      tags: [Pushes]
      operationId: refreshPushes
      summary: Refresh the live push view
      description: Triggers a frontend-safe refresh flow for the live push view.
      responses:
        "200":
          description: Refresh result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResponse"

  /api/push-refresh-jobs:
    post:
      tags: [Pushes]
      operationId: createPushRefreshJob
      summary: Create a push refresh job
      description: Creates a lightweight refresh job for the live push overview.
      responses:
        "200":
          description: Refresh job result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/feeds/competitor:
    get:
      tags: [Competition]
      operationId: listEditorialCompetitorItems
      summary: Get editorial competitor monitoring items
      description: Returns grouped and enriched competitor items for the editorial desk.
      responses:
        "200":
          description: Competitor monitoring response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompetitorResponse"

  /api/feeds/competitor/sport:
    get:
      tags: [Competition]
      operationId: listSportCompetitorItems
      summary: Get sport competitor monitoring items
      description: Returns grouped and enriched competitor items for the sport desk.
      responses:
        "200":
          description: Competitor monitoring response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompetitorResponse"

  /api/research-insights:
    get:
      tags: [Research]
      operationId: getResearchInsights
      summary: Get current research insights
      description: Returns lightweight research insights prepared for the frontend.
      responses:
        "200":
          description: Research insights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchInsightsResponse"

  /api/research-rules:
    get:
      tags: [Research]
      operationId: listResearchRules
      summary: List active research rules
      description: Returns the currently active editorial research rules with pagination metadata.
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/LimitDefault"
      responses:
        "200":
          description: Active research rules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchRulesResponse"

  /api/analytics/adobe-traffic:
    get:
      tags: [Analytics]
      operationId: getAdobeTraffic
      summary: Get Adobe traffic analytics
      description: Returns aggregated Adobe traffic data for the frontend analytics view.
      responses:
        "200":
          description: Adobe analytics payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdobeTrafficResponse"

  /api/ml-model:
    get:
      tags: [ML]
      operationId: getMlModelStatus
      summary: Get ML model status
      description: Returns the stable ML model status contract consumed by the frontend.
      responses:
        "200":
          description: ML model status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MlStatusResponse"

  /api/ml-model/monitoring:
    get:
      tags: [ML]
      operationId: getMlModelMonitoring
      summary: Get ML monitoring data
      description: Returns recent prediction comparisons and rolling monitoring metrics.
      responses:
        "200":
          description: ML monitoring payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MlMonitoringResponse"

  /api/ml-model/retraining-jobs:
    post:
      tags: [ML]
      operationId: createMlRetrainingJob
      summary: Trigger an ML retraining job
      description: Starts a manual retraining job for the LightGBM model.
      security:
        - adminApiKey: []
      responses:
        "200":
          description: Retraining trigger result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"

  /api/gbrt-model:
    get:
      tags: [GBRT]
      operationId: getGbrtModelStatus
      summary: Get GBRT model status
      description: Returns the stable GBRT model status contract consumed by the frontend.
      responses:
        "200":
          description: GBRT model status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GbrtStatusResponse"

  /api/gbrt-model/retraining-jobs:
    post:
      tags: [GBRT]
      operationId: createGbrtRetrainingJob
      summary: Trigger a GBRT retraining job
      description: Starts a manual retraining job for the GBRT model.
      security:
        - adminApiKey: []
      responses:
        "200":
          description: Retraining trigger result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"

  /api/gbrt-model/promotions:
    post:
      tags: [GBRT]
      operationId: createGbrtPromotion
      summary: Promote the GBRT challenger model
      description: Promotes the currently loaded GBRT challenger to the active model.
      security:
        - adminApiKey: []
      responses:
        "200":
          description: Promotion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"

  /api/tagesplan:
    get:
      tags: [Planning]
      operationId: getDailyPlan
      summary: Get the daily push plan
      description: Returns the current planning view for the requested date and mode.
      parameters:
        - name: date
          in: query
          required: false
          description: Planning date in ISO-8601 date format.
          schema:
            type: string
            format: date
        - name: mode
          in: query
          required: false
          description: Planning mode.
          schema:
            type: string
            enum: [redaktion, sport]
      responses:
        "200":
          description: Daily plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagesplanResponse"

  /api/tagesplan/retro:
    get:
      tags: [Planning]
      operationId: getDailyPlanRetro
      summary: Get daily plan retrospective data
      description: Returns the recent retrospective overview for the selected planning mode.
      parameters:
        - name: mode
          in: query
          required: false
          description: Planning mode.
          schema:
            type: string
            enum: [redaktion, sport]
      responses:
        "200":
          description: Daily plan retrospective
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagesplanRetroResponse"

  /api/tagesplan/suggestions:
    get:
      tags: [Planning]
      operationId: listDailyPlanSuggestions
      summary: List article suggestions for a daily plan
      description: Returns saved article suggestions for the requested date and mode.
      parameters:
        - name: date
          in: query
          required: false
          description: Planning date in ISO-8601 date format.
          schema:
            type: string
            format: date
        - name: mode
          in: query
          required: false
          description: Planning mode.
          schema:
            type: string
            enum: [redaktion, sport]
      responses:
        "200":
          description: Daily plan suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagesplanSuggestionsResponse"
        "422":
          $ref: "#/components/responses/UnprocessableContent"

  /api/push-title/generate:
    post:
      tags: [AI]
      operationId: generatePushTitle
      summary: Generate push title variants
      description: Generates advisory title variants for a given article title and category.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateTitleRequest"
      responses:
        "200":
          description: Generated title variants
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateTitleResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/push-title-generations:
    post:
      tags: [AI]
      operationId: createPushTitleGeneration
      summary: Create advisory push title variants
      description: Creates advisory push title variants for a given article title and category.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateTitleRequest"
      responses:
        "200":
          description: Generated title variants
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateTitleResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Authentication is handled at the infrastructure layer. Clients should send a valid Bearer token when required by the deployed environment.
    adminApiKey:
      type: apiKey
      in: header
      name: X-Admin-Key
      description: Administrative API key required for protected retraining and promotion endpoints.
  parameters:
    Offset:
      name: offset
      in: query
      required: false
      description: Zero-based collection offset.
      schema:
        type: integer
        minimum: 0
        default: 0
    LimitDefault:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return.
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
    LimitArticles:
      name: limit
      in: query
      required: false
      description: Maximum number of article candidates to return.
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 60

  responses:
    BadRequest:
      description: The request payload or parameters are invalid.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    BadGateway:
      description: Upstream dependency is currently unavailable.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    InternalServerError:
      description: An unexpected server-side error occurred.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    ServiceUnavailable:
      description: The requested capability is temporarily unavailable.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    UnprocessableContent:
      description: The request could not be validated.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
          description: URI identifying the problem type.
          example: "https://api.editorialsuite.io/problems/http-403"
        title:
          type: string
          description: Short human-readable summary of the problem.
          example: "Forbidden"
        status:
          type: integer
          format: int32
          description: HTTP status code for the problem response.
          example: 403
        detail:
          type: string
          description: Human-readable explanation for this specific occurrence.
          example: "Invalid sync secret"
        instance:
          type: string
          format: uri
          description: Request path of the failed API call.
          example: "/api/pushes/sync"

    HealthCheck:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          description: Indicates whether the check is healthy.
        error:
          type: string
          description: Optional error summary.

    HealthResponse:
      type: object
      required: [status, uptime, checks]
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
          description: Overall service health.
        uptime:
          type: integer
          format: int64
          description: Service uptime in seconds.
        checks:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/HealthCheck"
          description: Named check results.
        research:
          type: object
          properties:
            version:
              type: integer
              format: int32
            lastUpdate:
              type: string
              format: date-time

    Article:
      type: object
      required: [id, url, title, category, pubDate, score]
      properties:
        id:
          type: string
          description: Stable article identifier.
          example: "https://www.bild.de/politik/test-artikel"
        url:
          type: string
          format: uri
          description: Canonical article URL.
          example: "https://www.bild.de/politik/test-artikel"
        title:
          type: string
          description: Editorial article title.
          example: "Breaking Test Artikel"
        category:
          type: string
          description: Inferred editorial category.
          example: "politik"
        pubDate:
          type: string
          format: date-time
          description: Article publication timestamp.
          example: "2026-04-09T08:00:00Z"
        score:
          type: number
          format: float
          description: Heuristic editorial ranking score.
          example: 88.0
        predictedOR:
          type: number
          format: float
          description: Advisory predicted opening rate.
          example: 0.055
        isBreaking:
          type: boolean
          description: Whether the article looks like breaking news.
        isEilmeldung:
          type: boolean
          description: Whether the title indicates an urgent bulletin.
        isSport:
          type: boolean
          description: Whether the article belongs to sport coverage.
        isPlusArticle:
          type: boolean
          description: Whether the article appears to be paywalled.

    ArticleCollectionResponse:
      type: object
      required: [articles, total, count, offset, limit, fetchedAt]
      properties:
        articles:
          type: array
          items:
            $ref: "#/components/schemas/Article"
          description: Current page of ranked article candidates.
        total:
          type: integer
          format: int64
          description: Total number of matching article candidates.
          example: 142
        count:
          type: integer
          format: int32
          description: Backward-compatible alias for the total number of matching articles.
          example: 142
        offset:
          type: integer
          format: int32
          description: Offset of the first article in this response.
          example: 0
        limit:
          type: integer
          format: int32
          description: Page size used for this response.
          example: 60
        fetchedAt:
          type: string
          format: date-time
          description: Timestamp when the collection was built.
          example: "2026-04-09T09:15:00Z"

    Push:
      type: object
      required: [id, title, channel, sentAt, recipients, opened, openRate]
      properties:
        id:
          type: string
        title:
          type: string
        channel:
          type: string
        sentAt:
          type: string
          format: date-time
        recipients:
          type: integer
          format: int32
        opened:
          type: integer
          format: int32
        openRate:
          type: number
          format: float
        predictedOR:
          type: number
          format: float
        url:
          type: string
          format: uri

    PushDaySummary:
      type: object
      required: [count, avgOR, topOR, recipients]
      properties:
        count:
          type: integer
          format: int32
        avgOR:
          type: number
          format: float
        topOR:
          type: number
          format: float
        recipients:
          type: integer
          format: int32

    PushCollectionResponse:
      type: object
      required: [pushes, channels, today, total, offset, limit]
      properties:
        pushes:
          type: array
          items:
            $ref: "#/components/schemas/Push"
          description: Current page of recent push notifications.
        channels:
          type: array
          items:
            type: string
          description: Distinct channels represented in the current page.
        today:
          $ref: "#/components/schemas/PushDaySummary"
        total:
          type: integer
          format: int64
          description: Total number of push notifications in this response.
          example: 100
        offset:
          type: integer
          format: int32
          description: Offset of the first push notification in this response.
          example: 0
        limit:
          type: integer
          format: int32
          description: Page size used for this response.
          example: 100

    SyncResponse:
      type: object
      required: [ok, synced]
      properties:
        ok:
          type: boolean
          description: Whether the refresh job completed successfully.
          example: true
        synced:
          type: integer
          format: int32
          description: Number of push rows considered by the refresh.
          example: 50

    CompetitorItem:
      type: object
      required: [title, url, pubDate, outlet, outletColor, isGap, isExklusiv, isHot, outlets]
      properties:
        title:
          type: string
        url:
          type: string
          format: uri
        pubDate:
          type: string
          format: date-time
        outlet:
          type: string
        outletColor:
          type: string
        isGap:
          type: boolean
        isExklusiv:
          type: boolean
        isHot:
          type: boolean
        outlets:
          type: array
          items:
            type: string

    CompetitorSummary:
      type: object
      required: [total, gaps, exklusiv, hot]
      properties:
        total:
          type: integer
          format: int32
        gaps:
          type: integer
          format: int32
        exklusiv:
          type: integer
          format: int32
        hot:
          type: integer
          format: int32

    CompetitorResponse:
      type: object
      required: [items, summary, fetchedAt]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CompetitorItem"
        summary:
          $ref: "#/components/schemas/CompetitorSummary"
        fetchedAt:
          type: string
          format: date-time

    LearningItem:
      type: object
      required: [id, text, impact, createdAt]
      properties:
        id:
          type: string
        text:
          type: string
        impact:
          type: string
          enum: [high, medium, low]
        createdAt:
          type: string
          format: date-time

    ResearchInsightsResponse:
      type: object
      required: [learnings, experiments]
      properties:
        learnings:
          type: array
          items:
            $ref: "#/components/schemas/LearningItem"
        experiments:
          type: array
          items:
            type: object
        abTest:
          nullable: true
          type: object

    ResearchRule:
      type: object
      required: [id, category, rule, confidence, supportCount, createdAt]
      properties:
        id:
          type: string
        category:
          type: string
        rule:
          type: string
        confidence:
          type: number
          format: float
        supportCount:
          type: integer
          format: int32
        createdAt:
          type: string
          format: date-time

    ResearchRulesResponse:
      type: object
      required: [version, rules, rollingAccuracy, generatedAt]
      properties:
        version:
          type: integer
          format: int32
        rules:
          type: array
          items:
            $ref: "#/components/schemas/ResearchRule"
        rollingAccuracy:
          type: number
          format: float
        generatedAt:
          type: string
          format: date-time

    AdobeTrafficEntry:
      type: object
      required: [hour, pageviews, visitors]
      properties:
        hour:
          type: integer
          format: int32
        pageviews:
          type: integer
          format: int32
        visitors:
          type: integer
          format: int32

    AdobeTrafficArticle:
      type: object
      required: [title, url, pageviews]
      properties:
        title:
          type: string
        url:
          type: string
          format: uri
        pageviews:
          type: integer
          format: int32

    AdobeTrafficResponse:
      type: object
      required: [hourly, topArticles, fetchedAt]
      properties:
        hourly:
          type: array
          items:
            $ref: "#/components/schemas/AdobeTrafficEntry"
        topArticles:
          type: array
          items:
            $ref: "#/components/schemas/AdobeTrafficArticle"
        fetchedAt:
          type: string
          format: date-time

    MlStatusResponse:
      type: object
      required: [modelVersion, trainedAt, mae, rmse, r2, trainingRows, features, isEnsemble, advisoryOnly, actionAllowed]
      properties:
        modelVersion:
          type: string
        trainedAt:
          type: string
          format: date-time
        mae:
          type: number
          format: float
        rmse:
          type: number
          format: float
        r2:
          type: number
          format: float
        trainingRows:
          type: integer
          format: int32
        features:
          type: array
          items:
            type: string
        isEnsemble:
          type: boolean
        advisoryOnly:
          type: boolean
        actionAllowed:
          type: boolean

    MlMonitoringPrediction:
      type: object
      required: [id, predictedOR, timestamp]
      properties:
        id:
          type: string
        predictedOR:
          type: number
          format: float
        actualOR:
          type: number
          format: float
        error:
          type: number
          format: float
        timestamp:
          type: string
          format: date-time

    MlMonitoringResponse:
      type: object
      required: [recentPredictions, rollingMAE, drift]
      properties:
        recentPredictions:
          type: array
          items:
            $ref: "#/components/schemas/MlMonitoringPrediction"
        rollingMAE:
          type: number
          format: float
        drift:
          type: number
          format: float

    JobResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
        message:
          type: string
        jobId:
          type: string

    GbrtStatusResponse:
      type: object
      required: [active, modelVersion, mae, trainingRows, features, lastRetrain]
      properties:
        active:
          type: boolean
        modelVersion:
          type: string
        mae:
          type: number
          format: float
        trainingRows:
          type: integer
          format: int32
        features:
          type: array
          items:
            type: string
        lastRetrain:
          type: string

    TagesplanSlot:
      type: object
      required: [hour, label, predictedOR, isGoldenHour, recommendation]
      properties:
        hour:
          type: integer
          format: int32
        label:
          type: string
        predictedOR:
          type: number
          format: float
        actualOR:
          type: number
          format: float
        pushed:
          type: boolean
        pushedTitle:
          type: string
        pushedAt:
          type: string
          format: date-time
        isGoldenHour:
          type: boolean
        recommendation:
          type: string

    TagesplanResponse:
      type: object
      required: [date, mode, slots, goldenHour, avgOR, pushedCount, mae, trainedOnRows, pushedToday]
      properties:
        date:
          type: string
          format: date
        mode:
          type: string
        slots:
          type: array
          items:
            $ref: "#/components/schemas/TagesplanSlot"
        goldenHour:
          type: integer
          format: int32
        avgOR:
          type: number
          format: float
        pushedCount:
          type: integer
          format: int32
        mae:
          type: number
          format: float
        trainedOnRows:
          type: integer
          format: int32
        pushedToday:
          type: array
          items:
            type: object
        loading:
          type: boolean

    TagesplanRetroDay:
      type: object
      required: [date, avgOR, pushedCount, mae, slots]
      properties:
        date:
          type: string
          format: date
        avgOR:
          type: number
          format: float
        pushedCount:
          type: integer
          format: int32
        mae:
          type: number
          format: float
        slots:
          type: array
          items:
            $ref: "#/components/schemas/TagesplanSlot"

    TagesplanRetroSummary:
      type: object
      required: [avgOR, totalPushes, avgMAE]
      properties:
        avgOR:
          type: number
          format: float
        totalPushes:
          type: integer
          format: int32
        avgMAE:
          type: number
          format: float

    TagesplanRetroResponse:
      type: object
      required: [days, summary]
      properties:
        days:
          type: array
          items:
            $ref: "#/components/schemas/TagesplanRetroDay"
        summary:
          $ref: "#/components/schemas/TagesplanRetroSummary"

    TagesplanSuggestion:
      type: object
      required: [hour, title, url, score, predictedOR]
      properties:
        hour:
          type: integer
          format: int32
        title:
          type: string
        url:
          type: string
          format: uri
        score:
          type: number
          format: float
        predictedOR:
          type: number
          format: float

    TagesplanSuggestionsResponse:
      type: object
      required: [items, total, offset, limit, grouped]
      properties:
        items:
          type: array
          description: Flattened page of saved suggestion items.
          items:
            $ref: "#/components/schemas/TagesplanSuggestion"
        total:
          type: integer
          format: int64
          description: Total number of saved suggestion items.
          example: 24
        offset:
          type: integer
          format: int32
          description: Offset of the first suggestion in this response.
          example: 0
        limit:
          type: integer
          format: int32
          description: Page size used for this response.
          example: 20
        grouped:
          type: object
          description: Suggestions grouped by slot hour for convenience.
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/TagesplanSuggestion"

    GenerateTitleRequest:
      type: object
      required: [title]
      properties:
        url:
          type: string
          format: uri
        title:
          type: string
        category:
          type: string

    GenerateTitleResponse:
      type: object
      required: [title, alternativeTitles, reasoning, advisoryOnly]
      properties:
        title:
          type: string
          description: The recommended advisory push title.
          example: "Breaking Test Artikel: Das ist jetzt wichtig"
        alternativeTitles:
          type: array
          items:
            type: string
          description: Alternative advisory variants for editorial review.
        reasoning:
          type: string
          description: Short explanation for the recommended title.
        advisoryOnly:
          type: boolean
          description: Always true because the API never sends push notifications autonomously.
          example: true
