openapi: 3.1.0

info:
  title: Push Balancer API
  version: 3.1.0
  description: |
    Push Balancer is an editorial decision-support API for push notification planning.
    It exposes article candidates, live push history, research insights, and advisory
    machine-learning model outputs for editorial workflows.
  contact:
    name: Axel Springer National Media & Tech GmbH & Co. KG
    url: https://github.com/riccardospringer/next-push.balancer
    email: push-balancer@axelspringer.com

servers:
  - url: http://localhost:8050
    description: Local development

tags:
  - name: System
    description: Health and runtime diagnostics
  - name: Articles
    description: Article candidate discovery from the BILD sitemap
  - name: Feeds
    description: Sitemap, competitor, and international feed access
  - name: Pushes
    description: Live push history and refresh actions
  - name: Competition
    description: Competitor monitoring feeds
  - name: Research
    description: Research insights and derived editorial rules
  - name: Analytics
    description: Adobe traffic analytics and editorial support data
  - name: ML
    description: Advisory machine-learning model contracts
  - name: GBRT
    description: Gradient boosted regression tree model contracts
  - name: Planning
    description: Daily plan and retrospective planning data
  - name: AI
    description: Title generation and other AI-assisted capabilities
  - name: Legacy
    description: Legacy-compatible helper routes still exposed during migration

paths:
  /api/health:
    get:
      tags: [System]
      operationId: getHealth
      summary: Get the current health status
      description: Returns service health, endpoint checks, uptime, and research activity metadata.
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/memory-stats:
    get:
      tags: [System]
      operationId: getMemoryStats
      summary: Get internal memory diagnostics
      description: Returns internal memory and buffer diagnostics for administrative troubleshooting.
      security:
        - adminApiKey: []
      responses:
        "200":
          description: Memory diagnostics
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/articles:
    get:
      tags: [Articles]
      operationId: listArticles
      summary: List article candidates
      description: Returns typed article candidates from the BILD sitemap enriched with heuristic scoring.
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/LimitArticles"
      responses:
        "200":
          description: Article candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleCollectionResponse"
        "502":
          $ref: "#/components/responses/BadGateway"
        "422":
          $ref: "#/components/responses/UnprocessableContent"

  /api/pushes:
    get:
      tags: [Pushes]
      operationId: listPushes
      summary: List recent push notifications
      description: Returns recent push history together with same-day aggregate statistics.
      parameters:
        - name: limit
          in: query
          description: Maximum number of push entries to return.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 300
            default: 100
      responses:
        "200":
          description: Recent push history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushCollectionResponse"
        "422":
          $ref: "#/components/responses/UnprocessableContent"

  /api/pushes/refresh:
    post:
      tags: [Pushes]
      operationId: refreshPushes
      summary: Refresh the live push view
      description: Triggers a frontend-safe refresh flow for the live push view.
      responses:
        "200":
          description: Refresh result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/pushes/sync:
    post:
      tags: [Pushes]
      operationId: syncPushRelay
      summary: Sync push relay payload
      description: Accepts push relay payloads from a trusted upstream worker using a shared secret.
      requestBody:
        required: true
        description: Push relay payload sent by the trusted upstream synchronizer.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushSyncRequest"
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushSyncResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableContent"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/push-refresh-jobs:
    post:
      tags: [Pushes]
      operationId: createPushRefreshJob
      summary: Create a push refresh job
      description: Creates a lightweight refresh job for the live push overview.
      responses:
        "200":
          description: Refresh job result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/predictions/feedback:
    post:
      tags: [Pushes]
      operationId: createPredictionFeedback
      summary: Create prediction feedback
      description: Stores an observed opening rate for a previously predicted push notification.
      requestBody:
        required: true
        description: Feedback payload for a previously predicted push notification.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PredictionFeedbackRequest"
      responses:
        "200":
          description: Feedback was stored successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcknowledgementResponse"
        "422":
          $ref: "#/components/responses/UnprocessableContent"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/feeds/competitor:
    get:
      tags: [Competition]
      operationId: listEditorialCompetitorItems
      summary: Get editorial competitor monitoring items
      description: Returns grouped and enriched competitor items for the editorial desk.
      responses:
        "200":
          description: Competitor monitoring response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompetitorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/feeds/competitor/sport:
    get:
      tags: [Competition]
      operationId: listSportCompetitorItems
      summary: Get sport competitor monitoring items
      description: Returns grouped and enriched competitor items for the sport desk.
      responses:
        "200":
          description: Competitor monitoring response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompetitorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/research-insights:
    get:
      tags: [Research]
      operationId: getResearchInsights
      summary: Get current research insights
      description: Returns lightweight research insights prepared for the frontend.
      responses:
        "200":
          description: Research insights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchInsightsResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/research-rules:
    get:
      tags: [Research]
      operationId: listResearchRules
      summary: List active research rules
      description: Returns the currently active editorial research rules with pagination metadata.
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/LimitDefault"
      responses:
        "200":
          description: Active research rules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchRulesResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/check-plus:
    get:
      tags: [Analytics]
      operationId: checkPlusByUrl
      summary: Check a single article URL for BILD Plus
      description: Checks whether a single BILD article URL appears to be behind the BILD Plus paywall.
      parameters:
        - name: url
          in: query
          required: true
          description: Full BILD article URL to inspect.
          schema:
            type: string
            format: uri
            example: "https://www.bild.de/politik/test-artikel"
      responses:
        "200":
          description: Map of the requested URL to its paywall status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UrlBooleanMap"
        "422":
          $ref: "#/components/responses/UnprocessableContent"
    post:
      tags: [Analytics]
      operationId: checkPlusBatch
      summary: Check multiple article URLs for BILD Plus
      description: Checks up to twenty BILD article URLs for BILD Plus paywall detection in one request.
      requestBody:
        required: true
        description: Batch of BILD article URLs to inspect.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckPlusRequest"
      responses:
        "200":
          description: Map of requested URLs to their paywall status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UrlBooleanMap"
        "422":
          $ref: "#/components/responses/UnprocessableContent"

  /api/analytics/adobe-traffic:
    get:
      tags: [Analytics]
      operationId: getAdobeTraffic
      summary: Get Adobe traffic analytics
      description: Returns aggregated Adobe traffic data for the frontend analytics view.
      responses:
        "200":
          description: Adobe analytics payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdobeTrafficResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/ml-model:
    get:
      tags: [ML]
      operationId: getMlModelStatus
      summary: Get ML model status
      description: Returns the stable ML model status contract consumed by the frontend.
      responses:
        "200":
          description: ML model status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MlStatusResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/ml-model/monitoring:
    get:
      tags: [ML]
      operationId: getMlModelMonitoring
      summary: Get ML monitoring data
      description: Returns recent prediction comparisons and rolling monitoring metrics.
      responses:
        "200":
          description: ML monitoring payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MlMonitoringResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/ml-model/retraining-jobs:
    post:
      tags: [ML]
      operationId: createMlRetrainingJob
      summary: Trigger an ML retraining job
      description: Starts a manual retraining job for the LightGBM model.
      security:
        - adminApiKey: []
      responses:
        "200":
          description: Retraining trigger result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/gbrt-model:
    get:
      tags: [GBRT]
      operationId: getGbrtModelStatus
      summary: Get GBRT model status
      description: Returns the stable GBRT model status contract consumed by the frontend.
      responses:
        "200":
          description: GBRT model status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GbrtStatusResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/gbrt-model/retraining-jobs:
    post:
      tags: [GBRT]
      operationId: createGbrtRetrainingJob
      summary: Trigger a GBRT retraining job
      description: Starts a manual retraining job for the GBRT model.
      security:
        - adminApiKey: []
      responses:
        "200":
          description: Retraining trigger result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/gbrt-model/promotions:
    post:
      tags: [GBRT]
      operationId: createGbrtPromotion
      summary: Promote the GBRT challenger model
      description: Promotes the currently loaded GBRT challenger to the active model.
      security:
        - adminApiKey: []
      responses:
        "200":
          description: Promotion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/tagesplan:
    get:
      tags: [Planning]
      operationId: getDailyPlan
      summary: Get the daily push plan
      description: Returns the current planning view for the requested date and mode.
      parameters:
        - name: date
          in: query
          required: false
          description: Planning date in ISO-8601 date format.
          schema:
            type: string
            format: date
        - name: mode
          in: query
          required: false
          description: Planning mode.
          schema:
            type: string
            enum: [redaktion, sport]
      responses:
        "200":
          description: Daily plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagesplanResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/tagesplan/retro:
    get:
      tags: [Planning]
      operationId: getDailyPlanRetro
      summary: Get daily plan retrospective data
      description: Returns the recent retrospective overview for the selected planning mode.
      parameters:
        - name: mode
          in: query
          required: false
          description: Planning mode.
          schema:
            type: string
            enum: [redaktion, sport]
      responses:
        "200":
          description: Daily plan retrospective
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagesplanRetroResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/tagesplan/history:
    get:
      tags: [Planning]
      operationId: listDailyPlanHistory
      summary: List daily plan history
      description: Returns historical push-planning performance grouped by day and slot hour.
      parameters:
        - name: days
          in: query
          required: false
          description: Number of trailing days to include in the history view.
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 90
            default: 7
            example: 7
        - $ref: "#/components/parameters/Offset"
        - name: limit
          in: query
          required: false
          description: Maximum number of historical slot items to return.
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 1000
            default: 200
            example: 200
      responses:
        "200":
          description: Historical daily plan performance data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagesplanHistoryResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/tagesplan/suggestions:
    get:
      tags: [Planning]
      operationId: listDailyPlanSuggestions
      summary: List article suggestions for a daily plan
      description: Returns saved article suggestions for the requested date and mode.
      parameters:
        - name: date
          in: query
          required: false
          description: Planning date in ISO-8601 date format.
          schema:
            type: string
            format: date
        - name: mode
          in: query
          required: false
          description: Planning mode.
          schema:
            type: string
            enum: [redaktion, sport]
      responses:
        "200":
          description: Daily plan suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagesplanSuggestionsResponse"
        "422":
          $ref: "#/components/responses/UnprocessableContent"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/tagesplan/log-suggestions:
    post:
      tags: [Planning]
      operationId: createDailyPlanSuggestionsLog
      summary: Store daily plan suggestions
      description: Stores suggested articles for a daily plan slot in either the current React payload shape or the legacy flat payload shape.
      requestBody:
        required: true
        description: Daily plan suggestion payload in React or legacy format.
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/LogSuggestionsReactRequest"
                - $ref: "#/components/schemas/LogSuggestionsLegacyRequest"
      responses:
        "200":
          description: Suggestion log result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestionsLogResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/UnprocessableContent"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/push-title/generate:
    post:
      tags: [AI]
      operationId: generatePushTitle
      summary: Generate push title variants
      description: Generates advisory title variants for a given article title and category.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateTitleRequest"
      responses:
        "200":
          description: Generated title variants
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateTitleResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/push-title-generations:
    post:
      tags: [AI]
      operationId: createPushTitleGeneration
      summary: Create advisory push title variants
      description: Creates advisory push title variants for a given article title and category.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateTitleRequest"
      responses:
        "200":
          description: Generated title variants
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateTitleResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/feed:
    get:
      tags: [Feeds]
      operationId: getBildSitemap
      summary: Get the BILD news sitemap
      description: Returns the raw BILD news sitemap XML used to build article candidates.
      responses:
        "200":
          description: Raw XML sitemap.
          content:
            application/xml:
              schema:
                type: string
        "502":
          $ref: "#/components/responses/BadGateway"

  /api/push/{path}:
    get:
      tags: [Legacy]
      operationId: proxyPushApi
      summary: Proxy a legacy push API path
      description: Proxies a legacy push-statistics API path and falls back to synchronized cache data when the upstream is unavailable.
      parameters:
        - name: path
          in: path
          required: true
          description: Legacy push API path segment to proxy.
          schema:
            type: string
            example: "messages"
      responses:
        "200":
          description: Proxied push API payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyJsonObject"
        "502":
          $ref: "#/components/responses/BadGateway"

  /api/competitors:
    get:
      tags: [Feeds]
      operationId: listCompetitorFeeds
      summary: List cached competitor feeds
      description: Returns the legacy flat competitor feed dictionary used by older clients.
      responses:
        "200":
          description: Flat competitor feed dictionary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedMapResponse"
        "502":
          $ref: "#/components/responses/BadGateway"

  /api/competitor/{name}:
    get:
      tags: [Feeds]
      operationId: getCompetitorFeed
      summary: Get a single competitor feed
      description: Returns the raw XML for a single configured competitor feed.
      parameters:
        - name: name
          in: path
          required: true
          description: Competitor feed identifier.
          schema:
            type: string
            example: "welt"
      responses:
        "200":
          description: Raw competitor feed XML.
          content:
            application/xml:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          $ref: "#/components/responses/BadGateway"

  /api/sport-competitors:
    get:
      tags: [Feeds]
      operationId: listSportCompetitorFeeds
      summary: List cached sport competitor feeds
      description: Returns the legacy flat sport competitor feed dictionary used by older clients.
      responses:
        "200":
          description: Flat sport competitor feed dictionary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedMapResponse"
        "502":
          $ref: "#/components/responses/BadGateway"

  /api/sport-europa:
    get:
      tags: [Feeds]
      operationId: listSportEuropaFeeds
      summary: List sport Europe feeds
      description: Returns paginated sport-focused Europe feeds from the background cache.
      parameters:
        - $ref: "#/components/parameters/Offset"
        - name: limit
          in: query
          required: false
          description: Maximum number of feed groups to return.
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
            example: 20
      responses:
        "200":
          description: Paginated sport Europe feeds.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedGroupCollectionResponse"
        "502":
          $ref: "#/components/responses/BadGateway"

  /api/sport-global:
    get:
      tags: [Feeds]
      operationId: listSportGlobalFeeds
      summary: List sport global feeds
      description: Returns paginated sport-focused global feeds from the background cache.
      parameters:
        - $ref: "#/components/parameters/Offset"
        - name: limit
          in: query
          required: false
          description: Maximum number of feed groups to return.
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
            example: 20
      responses:
        "200":
          description: Paginated sport global feeds.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedGroupCollectionResponse"
        "502":
          $ref: "#/components/responses/BadGateway"

  /api/international:
    get:
      tags: [Feeds]
      operationId: listInternationalFeeds
      summary: List international feeds
      description: Returns paginated international feeds from the background cache.
      parameters:
        - $ref: "#/components/parameters/Offset"
        - name: limit
          in: query
          required: false
          description: Maximum number of feed groups to return.
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
            example: 20
      responses:
        "200":
          description: Paginated international feeds.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedGroupCollectionResponse"
        "502":
          $ref: "#/components/responses/BadGateway"

  /api/international/{name}:
    get:
      tags: [Feeds]
      operationId: getInternationalFeed
      summary: Get a single international feed
      description: Returns the raw XML for a single configured international feed.
      parameters:
        - name: name
          in: path
          required: true
          description: International feed identifier.
          schema:
            type: string
            example: "bbc"
      responses:
        "200":
          description: Raw international feed XML.
          content:
            application/xml:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          $ref: "#/components/responses/BadGateway"

  /api/competitors/xor:
    post:
      tags: [Competition]
      operationId: createCompetitorXorAnalysis
      summary: Create competitor XOR predictions
      description: Calculates simplified opening-rate predictions for competitor headlines using cached word-performance scoring.
      requestBody:
        required: true
        description: Headlines to score.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompetitorXorRequest"
      responses:
        "200":
          description: Simplified competitor XOR prediction result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompetitorXorResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/UnprocessableContent"

  /api/forschung:
    get:
      tags: [Research]
      operationId: getResearchState
      summary: Get the full research state
      description: Returns the current full research-worker state used by legacy research views and diagnostics.
      responses:
        "200":
          description: Full research state payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyJsonObject"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/learnings:
    get:
      tags: [Research]
      operationId: getResearchLearnings
      summary: Get data-driven learnings
      description: Returns research learnings and statistical summaries derived from historical push-performance data.
      responses:
        "200":
          description: Learnings payload for legacy research views.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyJsonObject"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/adobe/traffic:
    get:
      tags: [Analytics]
      operationId: getAdobeTrafficLegacy
      summary: Get legacy Adobe traffic payload
      description: Returns the legacy Adobe Analytics payload including enablement and loading flags.
      responses:
        "200":
          description: Legacy Adobe analytics payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyJsonObject"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/ml/safety-status:
    get:
      tags: [ML]
      operationId: getMlSafetyStatus
      summary: Get ML safety status
      description: Returns the advisory-only safety guard state for the ML subsystem.
      responses:
        "200":
          description: Safety status payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MlSafetyStatusResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/ml/status:
    get:
      tags: [ML]
      operationId: getMlLegacyStatus
      summary: Get legacy ML model status
      description: Returns the legacy ML status payload used by earlier clients.
      responses:
        "200":
          description: Legacy ML status payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MlStatusResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/ml/predict:
    get:
      tags: [ML]
      operationId: getMlPrediction
      summary: Predict a single article opening rate
      description: Returns a single advisory opening-rate prediction for an article using the active ML model stack.
      parameters:
        - name: title
          in: query
          required: false
          description: Article title to score.
          schema:
            type: string
        - name: cat
          in: query
          required: false
          description: Editorial category to score.
          schema:
            type: string
        - name: hour
          in: query
          required: false
          description: Local hour of day used for the prediction.
          schema:
            type: integer
            format: int32
        - name: is_eilmeldung
          in: query
          required: false
          description: Whether the article should be treated as an urgent bulletin.
          schema:
            type: integer
            format: int32
        - name: link
          in: query
          required: false
          description: Canonical article URL.
          schema:
            type: string
            format: uri
        - name: push_id
          in: query
          required: false
          description: Optional push identifier used for prediction logging.
          schema:
            type: string
      responses:
        "200":
          description: Single ML prediction result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MlPredictionResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/ml/experiments:
    get:
      tags: [ML]
      operationId: listMlExperiments
      summary: List ML experiments
      description: Returns paginated ML experiment runs and their stored metadata.
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/LimitDefault"
      responses:
        "200":
          description: Paginated experiment collection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyCollectionResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/ml/experiments/compare:
    get:
      tags: [ML]
      operationId: compareMlExperiments
      summary: Compare two ML experiments
      description: Returns a lightweight comparison between two experiment identifiers.
      parameters:
        - name: a
          in: query
          required: false
          description: First experiment identifier.
          schema:
            type: string
        - name: b
          in: query
          required: false
          description: Second experiment identifier.
          schema:
            type: string
      responses:
        "200":
          description: Experiment comparison payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyJsonObject"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/ml/ab-status:
    get:
      tags: [ML]
      operationId: getMlAbStatus
      summary: Get ML A/B test status
      description: Returns the current legacy A/B test status payload for the challenger flow.
      responses:
        "200":
          description: A/B status payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MlAbStatusResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/ml/monitoring:
    get:
      tags: [ML]
      operationId: listMlMonitoringEvents
      summary: List ML monitoring events
      description: Returns the legacy monitoring payload including event items and drift metrics.
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/LimitDefault"
      responses:
        "200":
          description: Monitoring payload with event items.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyJsonObject"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/ml/retrain:
    post:
      tags: [ML]
      operationId: createMlLegacyRetrainingJob
      summary: Trigger a legacy ML retraining job
      description: Triggers the legacy LightGBM retraining endpoint retained for operational compatibility.
      security:
        - adminApiKey: []
      responses:
        "200":
          description: Retraining trigger result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/ml/monitoring/tick:
    post:
      tags: [ML]
      operationId: createMlMonitoringTick
      summary: Trigger a manual ML monitoring tick
      description: Triggers the legacy manual monitoring tick endpoint for diagnostics and drift checks.
      security:
        - adminApiKey: []
      responses:
        "200":
          description: Monitoring tick result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcknowledgementResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/ml/predict-batch:
    post:
      tags: [ML]
      operationId: createMlBatchPrediction
      summary: Create ML batch predictions
      description: Returns advisory opening-rate predictions for up to 300 articles in one request.
      requestBody:
        required: true
        description: Articles to score in a batch request.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PredictBatchRequest"
      responses:
        "200":
          description: Batch prediction payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PredictBatchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/UnprocessableContent"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/predict-batch:
    post:
      tags: [ML]
      operationId: createMlBatchPredictionAlias
      summary: Create ML batch predictions via alias
      description: Legacy alias for the batch prediction endpoint retained for compatibility.
      requestBody:
        required: true
        description: Articles to score in a batch request.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PredictBatchRequest"
      responses:
        "200":
          description: Batch prediction payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PredictBatchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/UnprocessableContent"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/gbrt/status:
    get:
      tags: [GBRT]
      operationId: getGbrtLegacyStatus
      summary: Get legacy GBRT status
      description: Returns the detailed GBRT status payload retained for earlier clients and diagnostics.
      responses:
        "200":
          description: Legacy GBRT status payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyJsonObject"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/gbrt/model.json:
    get:
      tags: [GBRT]
      operationId: getGbrtModelJson
      summary: Get the serialized GBRT model
      description: Returns the serialized GBRT model JSON used by legacy clients for client-side evaluation.
      responses:
        "200":
          description: Serialized GBRT model payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyJsonObject"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/gbrt/predict:
    get:
      tags: [GBRT]
      operationId: getGbrtPrediction
      summary: Predict a single article opening rate with GBRT
      description: Returns a single advisory opening-rate prediction using the GBRT model.
      parameters:
        - name: title
          in: query
          required: false
          description: Article title to score.
          schema:
            type: string
        - name: cat
          in: query
          required: false
          description: Editorial category to score.
          schema:
            type: string
        - name: hour
          in: query
          required: false
          description: Local hour of day used for the prediction.
          schema:
            type: integer
            format: int32
        - name: is_eilmeldung
          in: query
          required: false
          description: Whether the article should be treated as an urgent bulletin.
          schema:
            type: integer
            format: int32
        - name: plus
          in: query
          required: false
          description: Whether the article is a paywalled plus article.
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: Single GBRT prediction result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GbrtPredictionResponse"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/gbrt/retrain:
    post:
      tags: [GBRT]
      operationId: createGbrtLegacyRetrainingJob
      summary: Trigger a legacy GBRT retraining job
      description: Triggers the legacy GBRT retraining endpoint retained for operational compatibility.
      security:
        - adminApiKey: []
      responses:
        "200":
          description: Retraining trigger result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/gbrt/force-promote:
    post:
      tags: [GBRT]
      operationId: createGbrtLegacyPromotion
      summary: Promote the GBRT challenger via legacy endpoint
      description: Triggers the legacy GBRT promotion endpoint retained for operational compatibility.
      security:
        - adminApiKey: []
      responses:
        "200":
          description: Promotion result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GbrtPromotionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/schwab-chat:
    post:
      tags: [AI]
      operationId: createSchwabChatMessage
      summary: Create a Schwab chat message
      description: Returns the current placeholder response for the not-yet-migrated Schwab chat flow.
      requestBody:
        required: true
        description: Chat message and conversation history.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SchwabChatRequest"
      responses:
        "200":
          description: Placeholder Schwab chat response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchwabChatResponse"
        "422":
          $ref: "#/components/responses/UnprocessableContent"

  /api/schwab-approval:
    post:
      tags: [AI]
      operationId: createSchwabApproval
      summary: Store a Schwab approval decision
      description: Stores an editorial approval or rejection decision for an advisory push recommendation.
      requestBody:
        required: true
        description: Approval decision payload.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SchwabApprovalRequest"
      responses:
        "200":
          description: Approval log acknowledgement.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchwabApprovalResponse"
        "422":
          $ref: "#/components/responses/UnprocessableContent"

components:
  securitySchemes:
    adminApiKey:
      type: apiKey
      in: header
      name: X-Admin-Key
      description: Administrative API key required for protected retraining and promotion endpoints.
  parameters:
    Offset:
      name: offset
      in: query
      required: false
      description: Zero-based collection offset.
      schema:
        type: integer
        minimum: 0
        default: 0
    LimitDefault:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return.
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
    LimitArticles:
      name: limit
      in: query
      required: false
      description: Maximum number of article candidates to return.
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 60

  responses:
    BadRequest:
      description: The request payload or parameters are invalid.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotFound:
      description: The requested resource does not exist.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Forbidden:
      description: The caller is not allowed to perform this action.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Unauthorized:
      description: Authentication failed or was missing.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    BadGateway:
      description: Upstream dependency is currently unavailable.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    InternalServerError:
      description: An unexpected server-side error occurred.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    ServiceUnavailable:
      description: The requested capability is temporarily unavailable.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    UnprocessableContent:
      description: The request could not be validated.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
          description: URI identifying the problem type.
          example: "https://api.editorialsuite.io/problems/http-403"
        title:
          type: string
          description: Short human-readable summary of the problem.
          example: "Forbidden"
        status:
          type: integer
          format: int32
          description: HTTP status code for the problem response.
          example: 403
        detail:
          type: string
          description: Human-readable explanation for this specific occurrence.
          example: "Invalid sync secret"
        instance:
          type: string
          format: uri
          description: Request path of the failed API call.
          example: "/api/pushes/sync"

    HealthCheck:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          description: Indicates whether the check is healthy.
        error:
          type: string
          description: Optional error summary.

    HealthResponse:
      type: object
      required: [status, uptime, checks]
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
          description: Overall service health.
        uptime:
          type: integer
          format: int64
          description: Service uptime in seconds.
        checks:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/HealthCheck"
          description: Named check results.
        research:
          type: object
          properties:
            version:
              type: integer
              format: int32
            lastUpdate:
              type: string
              format: date-time

    Article:
      type: object
      required: [id, url, title, category, pubDate, score]
      properties:
        id:
          type: string
          description: Stable article identifier.
          example: "https://www.bild.de/politik/test-artikel"
        url:
          type: string
          format: uri
          description: Canonical article URL.
          example: "https://www.bild.de/politik/test-artikel"
        title:
          type: string
          description: Editorial article title.
          example: "Breaking Test Artikel"
        category:
          type: string
          description: Inferred editorial category.
          example: "politik"
        pubDate:
          type: string
          format: date-time
          description: Article publication timestamp.
          example: "2026-04-09T08:00:00Z"
        score:
          type: number
          format: float
          description: Heuristic editorial ranking score.
          example: 88.0
        predictedOR:
          type: number
          format: float
          description: Advisory predicted opening rate.
          example: 0.055
        isBreaking:
          type: boolean
          description: Whether the article looks like breaking news.
        isEilmeldung:
          type: boolean
          description: Whether the title indicates an urgent bulletin.
        isSport:
          type: boolean
          description: Whether the article belongs to sport coverage.
        isPlusArticle:
          type: boolean
          description: Whether the article appears to be paywalled.

    ArticleCollectionResponse:
      type: object
      required: [articles, total, count, offset, limit, fetchedAt]
      properties:
        articles:
          type: array
          items:
            $ref: "#/components/schemas/Article"
          description: Current page of ranked article candidates.
        total:
          type: integer
          format: int64
          description: Total number of matching article candidates.
          example: 142
        count:
          type: integer
          format: int32
          description: Backward-compatible alias for the total number of matching articles.
          example: 142
        offset:
          type: integer
          format: int32
          description: Offset of the first article in this response.
          example: 0
        limit:
          type: integer
          format: int32
          description: Page size used for this response.
          example: 60
        fetchedAt:
          type: string
          format: date-time
          description: Timestamp when the collection was built.
          example: "2026-04-09T09:15:00Z"

    Push:
      type: object
      required: [id, title, channel, sentAt, recipients, opened, openRate]
      properties:
        id:
          type: string
        title:
          type: string
        channel:
          type: string
        sentAt:
          type: string
          format: date-time
        recipients:
          type: integer
          format: int32
        opened:
          type: integer
          format: int32
        openRate:
          type: number
          format: float
        predictedOR:
          type: number
          format: float
        url:
          type: string
          format: uri

    PushDaySummary:
      type: object
      required: [count, avgOR, topOR, recipients]
      properties:
        count:
          type: integer
          format: int32
        avgOR:
          type: number
          format: float
        topOR:
          type: number
          format: float
        recipients:
          type: integer
          format: int32

    PushCollectionResponse:
      type: object
      required: [pushes, channels, today, total, offset, limit]
      properties:
        pushes:
          type: array
          items:
            $ref: "#/components/schemas/Push"
          description: Current page of recent push notifications.
        channels:
          type: array
          items:
            type: string
          description: Distinct channels represented in the current page.
        today:
          $ref: "#/components/schemas/PushDaySummary"
        total:
          type: integer
          format: int64
          description: Total number of push notifications in this response.
          example: 100
        offset:
          type: integer
          format: int32
          description: Offset of the first push notification in this response.
          example: 0
        limit:
          type: integer
          format: int32
          description: Page size used for this response.
          example: 100

    SyncResponse:
      type: object
      required: [ok, synced]
      properties:
        ok:
          type: boolean
          description: Whether the refresh job completed successfully.
          example: true
        synced:
          type: integer
          format: int32
          description: Number of push rows considered by the refresh.
          example: 50

    AcknowledgementResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          description: Whether the action completed successfully.
          example: true

    LegacyJsonObject:
      type: object
      description: Flexible legacy payload that is still exposed for compatibility during migration.
      additionalProperties: true

    LegacyCollectionResponse:
      type: object
      required: [items, total, offset, limit]
      properties:
        items:
          type: array
          description: Current page of legacy collection items.
          items:
            $ref: "#/components/schemas/LegacyJsonObject"
        total:
          type: integer
          format: int64
          description: Total number of items matching the request.
          example: 42
        offset:
          type: integer
          format: int32
          description: Offset of the first item in this response.
          example: 0
        limit:
          type: integer
          format: int32
          description: Page size used for this response.
          example: 20

    PushSyncRequest:
      type: object
      required: [secret, messages, channels]
      properties:
        secret:
          type: string
          description: Shared secret used to authenticate the upstream push synchronizer.
          example: "sync-shared-secret"
        messages:
          type: array
          description: Raw push message objects from the upstream synchronizer.
          items:
            type: object
        channels:
          type: array
          description: Channel metadata accompanying the synchronized push messages.
          items:
            type: object

    PushSyncResponse:
      type: object
      required: [ok, received]
      properties:
        ok:
          type: boolean
          description: Whether the push sync payload was accepted.
          example: true
        received:
          type: integer
          format: int32
          description: Number of synchronized push messages accepted from the payload.
          example: 24

    PredictionFeedbackRequest:
      type: object
      required: [pushId, actualOr]
      properties:
        pushId:
          type: string
          description: Identifier of the push notification that received a prediction.
          example: "push-2026-04-10-0815"
        actualOr:
          type: number
          format: float
          description: Observed opening rate for the push notification.
          example: 0.0875
        title:
          type: string
          description: Optional push title for audit and training traceability.
          example: "Breaking Test Artikel: Das ist jetzt wichtig"

    CheckPlusRequest:
      type: object
      required: [urls]
      properties:
        urls:
          type: array
          description: BILD article URLs to inspect for a BILD Plus paywall.
          items:
            type: string
            format: uri
            example: "https://www.bild.de/politik/test-artikel"

    UrlBooleanMap:
      type: object
      description: Map of article URLs to boolean inspection results.
      additionalProperties:
        type: boolean

    FeedItemCompact:
      type: object
      properties:
        t:
          type: string
          description: Compact title field used by legacy feed views.
          example: "Breaking Test Artikel"
        l:
          type: string
          format: uri
          description: Compact link field used by legacy feed views.
          example: "https://www.bild.de/politik/test-artikel"
        p:
          type: string
          description: Publication date string as provided by the source feed.
          example: "Fri, 10 Apr 2026 08:00:00 GMT"
        d:
          type: string
          description: Short feed description snippet.
          example: "Kurzbeschreibung"
        c:
          type: array
          description: Feed categories.
          items:
            type: string
        lt:
          type: boolean
          description: Whether the item looks like a live ticker.
          example: false

    FeedMapResponse:
      type: object
      description: Flat mapping of feed names to compact feed item arrays.
      additionalProperties:
        type: array
        items:
          $ref: "#/components/schemas/FeedItemCompact"

    FeedGroup:
      type: object
      required: [name, articles]
      properties:
        name:
          type: string
          description: Feed group identifier.
          example: "bbc"
        articles:
          type: array
          description: Articles returned for this feed group.
          items:
            $ref: "#/components/schemas/FeedItemCompact"

    FeedGroupCollectionResponse:
      type: object
      required: [items, total, offset, limit]
      properties:
        items:
          type: array
          description: Current page of feed groups.
          items:
            $ref: "#/components/schemas/FeedGroup"
        total:
          type: integer
          format: int64
          description: Total number of feed groups matching the request.
          example: 24
        offset:
          type: integer
          format: int32
          description: Offset of the first feed group in this response.
          example: 0
        limit:
          type: integer
          format: int32
          description: Page size used for this response.
          example: 20

    CompetitorXorRequest:
      type: object
      required: [titles]
      properties:
        titles:
          type: array
          description: Titles or title/category objects to score.
          items:
            oneOf:
              - type: string
                example: "Breaking Test Artikel"
              - $ref: "#/components/schemas/LegacyJsonObject"

    CompetitorXorResult:
      type: object
      properties:
        predictedOr:
          type: number
          format: float
          description: Simplified advisory opening-rate prediction.
          example: 7.2
        basis:
          type: string
          description: Basis used for the simplified score.
          example: "word_perf"
        cat:
          type: string
          description: Derived editorial category.
          example: "Politik"
        isLiveticker:
          type: boolean
          description: Whether the title looks like a live ticker.
          example: false
        isEilmeldung:
          type: boolean
          description: Whether the title looks like an urgent bulletin.
          example: false
        wordMatches:
          type: integer
          format: int32
          description: Number of performance-bearing words matched in the cache.
          example: 3

    CompetitorXorResponse:
      type: object
      required: [results, count, elapsedMs]
      properties:
        results:
          type: object
          description: Prediction result keyed by the submitted title text.
