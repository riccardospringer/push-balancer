services:
  - type: web
    name: push-balancer
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    disk:
      name: push-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PUSH_API_BASE
        value: https://push-frontend.bildcms.de
      - key: DB_PATH
        value: /data/.push_history.db
      - key: PUSH_DB_MAX_ROWS
        value: "5000"
      - key: PAID_EXTERNAL_APIS_ENABLED
        value: "false"
      - key: BACKGROUND_AUTOMATIONS_ENABLED
        value: "false"
      - key: HEALTH_ACTIVE_CHECKS_ENABLED
        value: "false"
      - key: ECONOMY_MODE
        value: "true"
      - key: PUSH_LIVE_FETCH_ENABLED
        value: "true"
      - key: LIVE_FEED_FALLBACK_ENABLED
        value: "true"
      - key: RESEARCH_EXTERNAL_CONTEXT_ENABLED
        value: "false"
      - key: ARTICLE_PREDICTION_ENRICHMENT_ENABLED
        value: "true"
      - key: PUSH_TEAMS_ALERTS_ENABLED
        value: "true"
      - key: PUSH_TEAMS_WEBHOOK_URL
        sync: false
      - key: PUSH_TEAMS_MIN_SCORE
        value: "75"
      - key: PUSH_TEAMS_MIN_ALERT_SCORE
        value: "78"
      - key: PUSH_TEAMS_SCORE_ONLY_MODE
        value: "true"
      - key: PUSH_TEAMS_MIN_OR
        value: "5.0"
      - key: PUSH_TEAMS_MIN_MINUTES_SINCE_LAST_PUSH
        value: "30"
      - key: PUSH_TEAMS_ALERT_COOLDOWN_MINUTES
        value: "90"
      - key: PUSH_TEAMS_REPEAT_SUPPRESSION_HOURS
        value: "12"
      - key: PUSH_TEAMS_GLOBAL_COOLDOWN_MINUTES
        value: "30"
      - key: PUSH_TEAMS_REALERT_SCORE_DELTA
        value: "8"
      - key: PUSH_TEAMS_REALERT_OR_DELTA
        value: "0.75"
      - key: PUSH_TEAMS_ALLOWED_SECTIONS
        value: News,Politik,Wirtschaft,Regional,Digital,Unterhaltung
      - key: PUSH_TEAMS_BREAKING_OVERRIDE
        value: "true"
      - key: PUSH_TEAMS_BREAKING_MIN_SCORE
        value: "72"
      - key: TAGESPLAN_ON_DEMAND_BUILD_ENABLED
        value: "true"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_TITLE_GENERATION_ENABLED
        value: "false"
      - key: OPENAI_TITLE_GENERATION_MODEL
        value: gpt-4o-mini
      - key: OPENAI_TITLE_GENERATION_TIMEOUT_S
        value: "8.0"
      - key: OPENAI_TITLE_GENERATION_MAX_TOKENS
        value: "320"
      - key: OPENAI_BACKFILL_ENABLED
        value: "false"
      - key: OPENAI_PREDICTION_SCORING_ENABLED
        value: "false"
      - key: OPENAI_PREDICTION_SCORING_MODEL
        value: gpt-4o-mini
      - key: OPENAI_PREDICTION_SCORING_TIMEOUT_S
        value: "4.0"
      - key: OPENAI_PREDICTION_SCORING_MAX_TOKENS
        value: "60"
      - key: OPENAI_PREDICTION_SCORING_CACHE_TTL_S
        value: "3600"
      - key: ADMIN_API_KEY
        sync: false
      - key: CONSUMER_API_KEY
        sync: false
      - key: INTERNAL_ACCESS_ENABLED
        value: "true"
      - key: INTERNAL_ACCESS_ALLOWED_CIDRS
        sync: false
      - key: INTERNAL_ACCESS_EXEMPT_PATHS
        value: /api/health,/api/v1
      - key: PUSH_SYNC_SECRET
        sync: false
      - key: FOOTBALL_DATA_KEY
        sync: false
      - key: ODDS_API_KEY
        sync: false
      - key: ADOBE_CLIENT_ID
        sync: false
      - key: ADOBE_CLIENT_SECRET
        sync: false
      - key: ADOBE_TRAFFIC_ENABLED
        value: "false"
      - key: ADOBE_GLOBAL_COMPANY_ID
        value: axelsp2
